# Referência de produção local (espelha o layout Coolify: MySQL + API + Web).
# Uso: docker compose -f docker-compose.prod.yml up --build
#
# Ajuste VITE_API_URL no build da web se expuser em outra URL.

services:
  mysql:
    image: mysql:8.0
    container_name: heroes-factory-mysql-prod
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: heroes_factory
      MYSQL_USER: heroes
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-heroes_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      TZ: America/Sao_Paulo
    command:
      [
        "mysqld",
        "--character-set-server=utf8mb4",
        "--collation-server=utf8mb4_unicode_ci"
      ]
    volumes:
      - heroes_mysql_prod_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-uheroes",
          "-p${MYSQL_PASSWORD:-heroes_password}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: heroes-factory-api-prod
    restart: unless-stopped
    ports:
      - "${API_PORT:-3333}:3333"
    environment:
      NODE_ENV: production
      API_PORT: 3333
      API_HOST: 0.0.0.0
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      DATABASE_URL: mysql://heroes:${MYSQL_PASSWORD:-heroes_password}@mysql:3306/heroes_factory
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3333/health"
        ]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3333}
    container_name: heroes-factory-web-prod
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  heroes_mysql_prod_data:

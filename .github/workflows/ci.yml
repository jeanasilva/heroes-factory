name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: mysql://heroes:heroes_password@localhost:3306/heroes_factory
      API_PORT: 3333
      API_HOST: 0.0.0.0
      FRONTEND_URL: http://localhost:5173
      VITE_API_URL: http://localhost:3333

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm run test

      - name: Build
        run: npm run build
